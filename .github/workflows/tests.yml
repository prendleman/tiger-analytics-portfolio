name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Docker build and demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t tiger-portfolio .
      - name: Run demo in container
        run: docker run --rm tiger-portfolio

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Dependency audit
        run: pip install pip-audit && pip-audit
        continue-on-error: true
      - name: Generate demo data and validate
        run: |
          python src/python/generate_healthcare_data.py --config config/demo.yaml
          python src/python/validate_data.py --data-dir data/raw
      - name: Run readmission model (random split)
        run: python src/python/readmission_model.py
      - name: Run readmission model (temporal split)
        run: python src/python/readmission_model.py --split temporal
      - name: Run time series forecast
        run: python src/python/time_series_forecast.py
      - name: Pytest
        run: pytest tests/ -v --tb=short
